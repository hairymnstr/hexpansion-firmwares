name: Vendor ID
description: Request a vendor id.
title: "[VID]: "
labels: ["prefix"]
type: prefix
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a vendor id for your hexpansions.
  - type: input
    id: requested_id
    attributes:
      label: Requested ID
      description: What ID are you requesting. Do not request existing IDs.
      placeholder: 0xCAFE
    validations:
      required: true
